                    { name: "Sprint 30 sec (R2)", duration: 30, resistance: "Moderate", rpm: "110+", instructions: "Second pyramid - SPRINT!", effortRange: [9, 9] },

                    { name: "Sprint 45 sec (R2)", duration: 45, resistance: "Moderate", rpm: "105-110", instructions: "Push hard", effortRange: [9, 9] },
                    { name: "Recovery", duration: 45, resistance: "Light", rpm: "85-90", instructions: "Recovery", effortRange: [2, 2] },
                    { name: "Sprint 60 sec (R2)", duration: 60, resistance: "Moderate", rpm: "100-105", instructions: "Sustained effort", effortRange: [9, 9] },
                    { name: "Recovery", duration: 60, resistance: "Light", rpm: "85-90", instructions: "Breathe", effortRange: [2, 2] },
                    { name: "Sprint 45 sec (R2)", duration: 45, resistance: "Moderate", rpm: "105-110", instructions: "Almost there", effortRange: [9, 9] },
                    { name: "Recovery", duration: 45, resistance: "Light", rpm: "85-90", instructions: "Easy", effortRange: [2, 2] },
                    { name: "Sprint 30 sec (R2)", duration: 30, resistance: "Moderate", rpm: "115+", instructions: "Final pyramid sprint!", effortRange: [10, 10] },
                    { name: "Recovery", duration: 30, resistance: "Light", rpm: "85-90", instructions: "Well done", effortRange: [2, 2] },
                    { name: "Tabata Recovery", duration: 120, resistance: "Light", rpm: "85-90", instructions: "Prepare for Tabata", effortRange: [3, 3] },
                    { name: "Tabata 1", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "MAX EFFORT!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 2", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Go!", effortRange: [10, 10] },

                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 4", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Keep going!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 5", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "You got this!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 6", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Almost done!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 7", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Two more!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 8", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "LAST ONE!", effortRange: [10, 10] },
                    { name: "Tabata Recovery", duration: 120, resistance: "Light", rpm: "85-90", instructions: "Easy recovery between rounds", effortRange: [2, 2] },
                    { name: "Tabata 9", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Round 2 - GO!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 10", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Strong!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 11", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Keep it up!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 12", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Halfway!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 13", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Push through!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 14", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "You're strong!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 15", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "Second to last!", effortRange: [10, 10] },
                    { name: "Tabata Rest", duration: 10, resistance: "Light", rpm: "80", instructions: "Rest", effortRange: [2, 2] },
                    { name: "Tabata 16", duration: 20, resistance: "Moderate-Heavy", rpm: "95-100", instructions: "FINAL TABATA!", effortRange: [10, 10] },
                    { name: "Tempo Run", duration: 480, resistance: "Moderate-Heavy", rpm: "85-90", instructions: "Steady challenging pace, you can hold this", effortRange: [7, 7] },
                    { name: "Tempo Ease", duration: 120, resistance: "Moderate-Light", rpm: "85-90", instructions: "Gradually ease resistance", effortRange: [7, 5] },
                    { name: "Cool-down", duration: 300, resistance: "Light", rpm: "80-85", instructions: "Easy cool-down, great work!", effortRange: [3, 2] }
                ]
            }
        };

        function SpinWorkoutTimer() {
            const [selectedWorkout, setSelectedWorkout] = useState('workout1');
            const [currentPhase, setCurrentPhase] = useState(0);
            const [timeLeft, setTimeLeft] = useState(workouts.workout1.phases[0].duration);
            const [isRunning, setIsRunning] = useState(false);
            const [hasStarted, setHasStarted] = useState(false);
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [ftp, setFtp] = useState(null);
            const [ftpInput, setFtpInput] = useState('');
            const [showFtpInput, setShowFtpInput] = useState(false);

            const workout = workouts[selectedWorkout];
            const phase = workout.phases[currentPhase];
            const totalPhases = workout.phases.length;

            useEffect(() => {
                let interval;
                if (isRunning && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) {
                                if (currentPhase < totalPhases - 1) {
                                    if (soundEnabled) playBeep();
                                    setCurrentPhase(c => c + 1);
                                    return workouts[selectedWorkout].phases[currentPhase + 1].duration;
                                } else {
                                    setIsRunning(false);
                                    if (soundEnabled) playBeep(3);
                                    return 0;
                                }
                            }
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isRunning, timeLeft, currentPhase, selectedWorkout, totalPhases, soundEnabled]);

            const playBeep = (times = 1) => {
                if (!soundEnabled) return;
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                for (let i = 0; i < times; i++) {
                    setTimeout(() => {
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        oscillator.frequency.value = 800;
                        oscillator.type = 'sine';
                        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.1);
                    }, i * 200);
                }
            };

            const togglePlay = () => {
                setIsRunning(!isRunning);
                setHasStarted(true);
            };

            const reset = () => {
                setIsRunning(false);
                setCurrentPhase(0);
                setTimeLeft(workouts[selectedWorkout].phases[0].duration);
                setHasStarted(false);
            };

            const skipForward = () => {
                if (currentPhase < totalPhases - 1) {
                    if (soundEnabled) playBeep();
                    setCurrentPhase(c => c + 1);
                    setTimeLeft(workouts[selectedWorkout].phases[currentPhase + 1].duration);
                }
            };

            const skipBack = () => {
                if (currentPhase > 0) {
                    if (soundEnabled) playBeep();
                    setCurrentPhase(c => c - 1);
                    setTimeLeft(workouts[selectedWorkout].phases[currentPhase - 1].duration);
                }
            };

            const changeWorkout = (workoutKey) => {
                setSelectedWorkout(workoutKey);
                setCurrentPhase(0);
                setTimeLeft(workouts[workoutKey].phases[0].duration);
                setIsRunning(false);
                setHasStarted(false);
            };

            const handleFtpSubmit = () => {
                const value = parseInt(ftpInput);
                if (value && value > 0 && value < 1000) {
                    setFtp(value);
                    setShowFtpInput(false);
                }
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const isRecovery = phase.name.toLowerCase().includes('recovery') || 
                             phase.name.toLowerCase().includes('cool-down') || 
                             phase.name.toLowerCase().includes('rest');
            const isTabata = phase.name.toLowerCase().includes('tabata');

            const getEffortLevel = () => {
                if (phase.effortRange) {
                    return phase.effortRange[0];
                }
                return 5;
            };

            const effortToPercent = (effort) => {
                if (effort <= 2) return 50;
                if (effort === 3) return 63;
                if (effort === 4) return 70;
                if (effort === 5) return 78;
                if (effort === 6) return 85;
                if (effort === 7) return 93;
                if (effort === 8) return 100;
                if (effort === 9) return 120;
                if (effort === 10) return 160;
                return 80;
            };

            const getTargetPowerPercent = () => {
                if (phase.effortRange) {
                    const [minEffort, maxEffort] = phase.effortRange;
                    if (minEffort === maxEffort) {
                        return [effortToPercent(minEffort), null];
                    } else {
                        return [effortToPercent(minEffort), effortToPercent(maxEffort)];
                    }
                }
                return [effortToPercent(getEffortLevel()), null];
            };

            const effortLevel = getEffortLevel();
            const [minPowerPercent, maxPowerPercent] = getTargetPowerPercent();
            const targetPowerMin = ftp ? Math.round(ftp * minPowerPercent / 100) : null;
            const targetPowerMax = maxPowerPercent && ftp ? Math.round(ftp * maxPowerPercent / 100) : null;

            const effortColor = 
                effortLevel >= 9 ? 'from-red-600 to-red-700' :
                effortLevel >= 7 ? 'from-orange-500 to-red-600' :
                effortLevel >= 5 ? 'from-yellow-500 to-orange-500' :
                'from-green-500 to-emerald-600';

            const progress = ((phase.duration - timeLeft) / phase.duration) * 100;
            const totalDuration = workout.phases.reduce((acc, p) => acc + p.duration, 0);
            const elapsedTotal = workout.phases.slice(0, currentPhase).reduce((acc, p) => acc + p.duration, 0) + (phase.duration - timeLeft);
            const overallProgress = (elapsedTotal / totalDuration) * 100;

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 text-white p-4 flex flex-col">
                    {!hasStarted && (
                        <div className="mb-6">
                            <h1 className="text-2xl font-bold mb-4 text-center">Select Your Workout</h1>
                            
                            {!ftp && !showFtpInput && (
                                <div className="max-w-2xl mx-auto mb-4 bg-blue-900/30 border border-blue-500/50 rounded-lg p-4">
                                    <p className="text-sm mb-2">💡 Want to see target power zones? Enter your FTP (Functional Threshold Power)</p>
                                    <button
                                        onClick={() => setShowFtpInput(true)}
                                        className="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors"
                                    >
                                        Set FTP
                                    </button>
                                </div>
                            )}

                            {showFtpInput && (
                                <div className="max-w-2xl mx-auto mb-4 bg-gray-800 rounded-lg p-4">
                                    <label className="block text-sm font-medium mb-2">Enter your FTP (watts):</label>
                                    <div className="flex gap-2">
                                        <input
                                            type="number"
                                            value={ftpInput}
                                            onChange={(e) => setFtpInput(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && handleFtpSubmit()}
                                            placeholder="e.g., 250"
                                            className="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500"
                                            min="50"
                                            max="600"
                                        />
                                        <button
                                            onClick={handleFtpSubmit}
                                            className="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg font-medium transition-colors"
                                        >
                                            Save
                                        </button>
                                        <button
                                            onClick={() => setShowFtpInput(false)}
                                            className="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg transition-colors"
                                        >
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            )}

                            {ftp && (
                                <div className="max-w-2xl mx-auto mb-4 bg-green-900/30 border border-green-500/50 rounded-lg p-3 flex justify-between items-center">
                                    <span className="text-sm">FTP: <strong>{ftp}W</strong></span>
                                    <button
                                        onClick={() => {
                                            setFtp(null);
                                            setFtpInput('');
                                        }}
                                        className="text-sm text-gray-400 hover:text-white transition-colors"
                                    >
                                        Change
                                    </button>
                                </div>
                            )}
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 max-w-2xl mx-auto">
                                <button
                                    onClick={() => changeWorkout('workout1')}
                                    className={`p-4 rounded-lg border-2 transition-all ${
                                        selectedWorkout === 'workout1'
                                            ? 'border-blue-500 bg-blue-500/20'
                                            : 'border-gray-600 bg-gray-800/50 hover:border-gray-500'
                                    }`}
                                >
                                    <div className="font-bold text-lg mb-1">Workout 1</div>
                                    <div className="text-sm text-gray-300">Hill Climb & Strength</div>
                                    <div className="text-xs text-gray-400 mt-1">45 min • Endurance focused</div>
                                </button>
                                <button
                                    onClick={() => changeWorkout('workout2')}
                                    className={`p-4 rounded-lg border-2 transition-all ${
                                        selectedWorkout === 'workout2'
                                            ? 'border-blue-500 bg-blue-500/20'
                                            : 'border-gray-600 bg-gray-800/50 hover:border-gray-500'
                                    }`}
                                >
                                    <div className="font-bold text-lg mb-1">Workout 2</div>
                                    <div className="text-sm text-gray-300">Speed & Power</div>
                                    <div className="text-xs text-gray-400 mt-1">45 min • Interval focused</div>
                                </button>
                            </div>
                        </div>
                    )}

                    <div className="flex-1 flex flex-col max-w-4xl mx-auto w-full">
                        <div className="mb-6">
                            <div className="flex justify-between items-center mb-2">
                                <h2 className="text-xl font-bold">{workout.name}</h2>
                                <button
                                    onClick={() => setSoundEnabled(!soundEnabled)}
                                    className="p-2 bg-gray-700 rounded-lg hover:bg-gray-600 transition-colors"
                                >
                                    {soundEnabled ? '🔊' : '🔇'}
                                </button>
                            </div>
                            <div className="bg-gray-700 rounded-full h-2 overflow-hidden">
                                <div 
                                    className="bg-gradient-to-r from-blue-500 to-purple-500 h-full transition-all duration-300"
                                    style={{ width: `${overallProgress}%` }}
                                />
                            </div>
                            <div className="text-sm text-gray-400 mt-1 text-center">
                                Phase {currentPhase + 1} of {totalPhases}
                            </div>
                        </div>

                        <div className={`rounded-2xl p-8 mb-6 transition-all bg-gradient-to-br ${effortColor} shadow-2xl`}>
                            <div className="text-center mb-4">
                                <div className="text-sm opacity-90 mb-2">EFFORT LEVEL</div>
                                <div className="flex justify-center gap-1 mb-4">
                                    {[...Array(10)].map((_, i) => (
                                        <div
                                            key={i}
                                            className={`w-8 h-3 rounded-full transition-all ${
                                                i < effortLevel ? 'bg-white' : 'bg-white/20'
                                            }`}
                                        />
                                    ))}
                                </div>
                                <div className="text-lg font-bold">{effortLevel}/10</div>
                            </div>

                            <div className="text-center mb-6">
                                <div className="text-6xl sm:text-8xl font-bold mb-2 drop-shadow-lg">
                                    {formatTime(timeLeft)}
                                </div>
                                <div className="bg-white/20 rounded-full h-3 overflow-hidden mb-4">
                                    <div 
                                        className="bg-white h-full transition-all duration-1000 ease-linear"
                                        style={{ width: `${progress}%` }}
                                    />
                                </div>
                            </div>

                            <div className="text-center mb-6">
                                <h3 className="text-3xl sm:text-4xl font-bold mb-3 drop-shadow-lg">{phase.name}</h3>
                                <p className="text-xl sm:text-2xl mb-4 drop-shadow-lg">{phase.instructions}</p>
                            </div>

                            <div className="grid grid-cols-3 gap-4 bg-black/20 rounded-xl p-4">
                                <div className="text-center">
                                    <div className="text-sm opacity-80 mb-1">Target RPM</div>
                                    <div className="text-2xl font-bold">{phase.rpm}</div>
                                </div>
                                {targetPowerMin && (
                                    <div className="text-center">
                                        <div className="text-sm opacity-80 mb-1">Target Power</div>
                                        {targetPowerMax ? (
                                            <>
                                                <div className="text-2xl font-bold">{targetPowerMin}-{targetPowerMax}W</div>
                                                <div className="text-xs opacity-70 mt-1">{minPowerPercent}-{maxPowerPercent}% FTP</div>
                                            </>
                                        ) : (
                                            <>
                                                <div className="text-2xl font-bold">{targetPowerMin}W</div>
                                                <div className="text-xs opacity-70 mt-1">{minPowerPercent}% FTP</div>
                                            </>
                                        )}
                                    </div>
                                )}
                                {!targetPowerMin && (
                                    <div className="text-center">
                                        <div className="text-sm opacity-80 mb-1">Resistance</div>
                                        <div className="text-lg font-bold">{phase.resistance}</div>
                                    </div>
                                )}
                                <div className="text-center">
                                    <div className="text-sm opacity-80 mb-1">Type</div>
                                    <div className="text-lg font-bold">
                                        {isTabata ? '🔥 Tabata' : 
                                         isRecovery ? '💚 Recovery' : 
                                         phase.name.toLowerCase().includes('sprint') ? '⚡ Sprint' :
                                         phase.name.toLowerCase().includes('climb') ? '⛰️ Climb' :
                                         '🚴 Tempo'}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-3 justify-center mb-6 flex-wrap">
                            <button
                                onClick={skipBack}
                                disabled={currentPhase === 0}
                                className="bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:opacity-50 text-white px-6 py-4 rounded-xl font-bold text-lg shadow-lg transition-all transform hover:scale-105 disabled:transform-none disabled:cursor-not-allowed"
                            >
                                ← Previous
                            </button>
                            <button
                                onClick={togglePlay}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-bold text-lg flex items-center gap-2 shadow-lg transition-all transform hover:scale-105"
                            >
                                {isRunning ? '⏸' : '▶'}
                                {isRunning ? 'Pause' : hasStarted ? 'Resume' : 'Start'}
                            </button>
                            <button
                                onClick={skipForward}
                                disabled={currentPhase === totalPhases - 1}
                                className="bg-gray-700 hover:bg-gray-600 disabled:bg-gray-800 disabled:opacity-50 text-white px-6 py-4 rounded-xl font-bold text-lg shadow-lg transition-all transform hover:scale-105 disabled:transform-none disabled:cursor-not-allowed"
                            >
                                Next →
                            </button>
                            <button
                                onClick={reset}
                                className="bg-gray-700 hover:bg-gray-600 text-white px-8 py-4 rounded-xl font-bold text-lg flex items-center gap-2 shadow-lg transition-all transform hover:scale-105"
                            >
                                🔄 Reset
                            </button>
                        </div>

                        {currentPhase < totalPhases - 1 && (
                            <div className="bg-gray-800/50 rounded-xl p-4 backdrop-blur-sm">
                                <div className="text-sm text-gray-400 mb-2">Up Next:</div>
                                <div className="flex justify-between items-center">
                                    <div>
                                        <div className="font-bold">{workout.phases[currentPhase + 1].name}</div>
                                        <div className="text-sm text-gray-400">{workout.phases[currentPhase + 1].instructions}</div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-sm text-gray-400">Resistance</div>
                                        <div className="font-bold">{workout.phases[currentPhase + 1].resistance}</div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SpinWorkoutTimer />);
    </script>
</body>
</html>
